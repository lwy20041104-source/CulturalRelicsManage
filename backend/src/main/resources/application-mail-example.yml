# QQ邮箱配置模板
# 使用方式: 复制为 application-mail-qq.yml 并填入你的QQ邮箱授权码
spring:
  mail:
    enabled: true
    host: smtp.qq.com
    port: 465
    username: 你的QQ邮箱地址
    password: 你的QQ邮箱SMTP授权码
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            trust: smtp.qq.com
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            port: 465
    default-encoding: UTF-8
