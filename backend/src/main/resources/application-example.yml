# ============================================
# 应用配置文件模板
# 使用方式: 复制为 application.yml 并修改为你的实际配置
# ============================================
spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  application:
    name: cultural-relics-manage
  profiles:
    active: dev
    include: mail-qq
  datasource:
    url: jdbc:mysql://localhost:3306/cultural_relics?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: 你的数据库用户名
    password: 你的数据库密码
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
    password: 你的Redis密码(可选)
    timeout: 10000ms
    jedis:
      pool:
        max-active: 50
        max-idle: 8
        min-idle: 0
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

mybatis:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: info
    com.example: debug

jwt:
  secret: 请生成一个Base64编码的密钥(至少256位)
  expiration: 86400000
  refresh-expiration: 604800000

file:
  upload-path: ./uploads/
  max-size: 10485760

# 百度AI配置 (可选)
baidu:
  ai:
    enabled: false
    app-id: 你的百度AI APP_ID
    api-key: 你的百度AI API_KEY
    secret-key: 你的百度AI SECRET_KEY
    confidence-threshold: 0.6

# DeepSeek AI配置 (可选)
deepseek:
  api-key: 你的DeepSeek API Key
  api-url: https://api.deepseek.com/v1/chat/completions
  model: deepseek-chat
  max-tokens: 2000
  temperature: 0.7
  connect-timeout: 10000
  read-timeout: 30000
