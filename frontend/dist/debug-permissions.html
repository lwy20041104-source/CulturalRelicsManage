<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>权限调试工具</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #4ec9b0;
            border-bottom: 2px solid #4ec9b0;
            padding-bottom: 10px;
        }
        h2 {
            color: #569cd6;
            margin-top: 30px;
        }
        .section {
            background: #252526;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            border-left: 4px solid #007acc;
        }
        .success {
            border-left-color: #4ec9b0;
        }
        .error {
            border-left-color: #f48771;
        }
        .warning {
            border-left-color: #dcdcaa;
        }
        pre {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            border: 1px solid #3e3e42;
        }
        .label {
            color: #9cdcfe;
            font-weight: bold;
        }
        .value {
            color: #ce9178;
        }
        .true {
            color: #4ec9b0;
            font-weight: bold;
        }
        .false {
            color: #f48771;
            font-weight: bold;
        }
        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        button:hover {
            background: #1177bb;
        }
        button.danger {
            background: #c72e0f;
        }
        button.danger:hover {
            background: #e03e1e;
        }
        button.success {
            background: #0e7c0e;
        }
        button.success:hover {
            background: #13a10e;
        }
        .actions {
            margin: 20px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #3e3e42;
        }
        th {
            background: #1e1e1e;
            color: #569cd6;
        }
        .status-ok {
            color: #4ec9b0;
        }
        .status-error {
            color: #f48771;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 权限调试工具</h1>
        
        <div class="actions">
            <button onclick="runDiagnostics()">🔄 刷新诊断</button>
            <button class="danger" onclick="clearPermissions()">🗑️ 清除权限缓存</button>
            <button class="success" onclick="addImagePermission()">➕ 手动添加图片权限</button>
            <button onclick="window.location.href='/login'">🚪 前往登录</button>
        </div>

        <div id="output"></div>
    </div>

    <script>
        function runDiagnostics() {
            const output = document.getElementById('output');
            let html = '';

            // 1. SessionStorage 内容
            html += '<div class="section">';
            html += '<h2>📦 SessionStorage 内容</h2>';
            html += '<table>';
            html += '<tr><th>键</th><th>值</th></tr>';
            
            const keys = ['token', 'username', 'realName', 'roleCode', 'role', 'permissions', 'userId', 'museumName'];
            keys.forEach(key => {
                const value = sessionStorage.getItem(key);
                html += `<tr><td class="label">${key}</td><td class="value">${value || '<span class="status-error">未设置</span>'}</td></tr>`;
            });
            html += '</table>';
            html += '</div>';

            // 2. 权限列表详情
            html += '<div class="section">';
            html += '<h2>🔐 权限列表详情</h2>';
            let permissions = [];
            try {
                permissions = JSON.parse(sessionStorage.getItem('permissions') || '[]');
            } catch (e) {
                html += `<p class="status-error">❌ 权限列表解析失败: ${e.message}</p>`;
            }
            
            if (permissions.length > 0) {
                html += `<p class="status-ok">✅ 共有 ${permissions.length} 个权限</p>`;
                html += '<pre>' + JSON.stringify(permissions, null, 2) + '</pre>';
                
                // 检查是否包含 images:manage
                const hasImagePerm = permissions.includes('images:manage');
                html += '<p>';
                html += `<span class="label">images:manage 权限: </span>`;
                html += hasImagePerm 
                    ? '<span class="true">✅ 存在</span>' 
                    : '<span class="false">❌ 不存在</span>';
                html += '</p>';
            } else {
                html += '<p class="status-error">❌ 权限列表为空</p>';
            }
            html += '</div>';

            // 3. 权限检查结果
            html += '<div class="section">';
            html += '<h2>✅ 权限检查结果</h2>';
            html += '<table>';
            html += '<tr><th>权限</th><th>状态</th></tr>';
            
            const requiredPerms = [
                'dashboard:view',
                'relics:manage',
                'categories:manage',
                'images:manage',
                'loans:manage',
                'maintenance:manage',
                'repairs:manage',
                'users:manage',
                'ai:query'
            ];
            
            requiredPerms.forEach(perm => {
                const has = permissions.includes(perm);
                const status = has 
                    ? '<span class="status-ok">✅ 有权限</span>' 
                    : '<span class="status-error">❌ 无权限</span>';
                const highlight = perm === 'images:manage' ? ' style="background: #2d2d30;"' : '';
                html += `<tr${highlight}><td class="label">${perm}</td><td>${status}</td></tr>`;
            });
            html += '</table>';
            html += '</div>';

            // 4. 菜单项检查
            html += '<div class="section">';
            html += '<h2>📋 菜单项检查</h2>';
            
            // 尝试在父窗口中查找菜单项
            let menuItem = null;
            try {
                if (window.parent && window.parent.document) {
                    menuItem = window.parent.document.querySelector('[index="/images"]');
                }
            } catch (e) {
                html += `<p class="status-error">⚠️ 无法访问父窗口: ${e.message}</p>`;
            }
            
            if (menuItem) {
                html += '<p class="status-ok">✅ 菜单项已渲染</p>';
                html += `<p><span class="label">菜单文本: </span><span class="value">${menuItem.textContent}</span></p>`;
                html += `<p><span class="label">是否可见: </span><span class="${menuItem.offsetParent !== null ? 'true' : 'false'}">${menuItem.offsetParent !== null ? '是' : '否'}</span></p>`;
            } else {
                html += '<p class="status-error">❌ 菜单项未渲染</p>';
                html += '<p>可能原因：</p>';
                html += '<ul>';
                html += '<li>权限列表中缺少 images:manage</li>';
                html += '<li>前端代码未正确加载</li>';
                html += '<li>Vue 组件未正确渲染</li>';
                html += '</ul>';
            }
            html += '</div>';

            // 5. 路由检查
            html += '<div class="section">';
            html += '<h2>🛣️ 路由检查</h2>';
            html += '<p><a href="/images" target="_parent" style="color: #4ec9b0;">点击这里尝试访问图片管理页面</a></p>';
            html += '</div>';

            // 6. 建议操作
            html += '<div class="section warning">';
            html += '<h2>💡 建议操作</h2>';
            
            if (!permissions.includes('images:manage')) {
                html += '<h3>问题：缺少 images:manage 权限</h3>';
                html += '<p><strong>解决方案：</strong></p>';
                html += '<ol>';
                html += '<li><strong>方案1（推荐）：</strong>点击上方"清除权限缓存"按钮，然后重新登录</li>';
                html += '<li><strong>方案2：</strong>点击上方"手动添加图片权限"按钮（临时方案）</li>';
                html += '<li><strong>方案3：</strong>退出登录，重新登录</li>';
                html += '</ol>';
                
                html += '<h3>为什么会出现这个问题？</h3>';
                html += '<p>权限信息在登录时从后端获取并保存到 sessionStorage。如果在添加图片管理功能之前已经登录，sessionStorage 中保存的是旧的权限列表。</p>';
            } else if (!menuItem) {
                html += '<h3>问题：有权限但菜单未显示</h3>';
                html += '<p><strong>可能原因：</strong></p>';
                html += '<ul>';
                html += '<li>前端代码未正确编译</li>';
                html += '<li>浏览器缓存了旧版本</li>';
                html += '<li>Vue 组件渲染问题</li>';
                html += '</ul>';
                html += '<p><strong>解决方案：</strong></p>';
                html += '<ol>';
                html += '<li>清除浏览器缓存（Ctrl+Shift+Delete）</li>';
                html += '<li>硬刷新页面（Ctrl+F5）</li>';
                html += '<li>重启前端开发服务器</li>';
                html += '</ol>';
            } else {
                html += '<p class="status-ok">✅ 一切正常！菜单应该可以正常显示。</p>';
            }
            html += '</div>';

            output.innerHTML = html;
        }

        function clearPermissions() {
            if (confirm('确定要清除权限缓存吗？清除后需要重新登录。')) {
                sessionStorage.removeItem('permissions');
                alert('权限缓存已清除！页面将刷新并跳转到登录页。');
                window.location.href = '/login';
            }
        }

        function addImagePermission() {
            try {
                let permissions = JSON.parse(sessionStorage.getItem('permissions') || '[]');
                if (!permissions.includes('images:manage')) {
                    permissions.push('images:manage');
                    sessionStorage.setItem('permissions', JSON.stringify(permissions));
                    alert('✅ 已手动添加 images:manage 权限！\n\n注意：这是临时方案，建议重新登录以获取完整权限。\n\n页面将刷新。');
                    window.parent.location.reload();
                } else {
                    alert('ℹ️ images:manage 权限已存在，无需添加。');
                }
            } catch (e) {
                alert('❌ 添加权限失败: ' + e.message);
            }
        }

        // 页面加载时自动运行诊断
        window.onload = runDiagnostics;
    </script>
</body>
</html>
