<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片管理菜单诊断工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .content {
            padding: 30px;
        }
        
        .check-item {
            margin-bottom: 20px;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
        }
        
        .check-item.success {
            border-color: #4caf50;
            background: #f1f8f4;
        }
        
        .check-item.error {
            border-color: #f44336;
            background: #fef5f5;
        }
        
        .check-item.warning {
            border-color: #ff9800;
            background: #fff8f0;
        }
        
        .check-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .check-result {
            font-size: 14px;
            line-height: 1.6;
            color: #555;
        }
        
        .check-result pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            margin-top: 10px;
            font-size: 12px;
        }
        
        .icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }
        
        .icon.success {
            background: #4caf50;
            color: white;
        }
        
        .icon.error {
            background: #f44336;
            color: white;
        }
        
        .icon.warning {
            background: #ff9800;
            color: white;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 20px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .solution {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
            border-left: 4px solid #2196f3;
        }
        
        .solution-title {
            font-weight: 600;
            color: #1976d2;
            margin-bottom: 8px;
        }
        
        .solution-steps {
            font-size: 14px;
            line-height: 1.8;
            color: #555;
        }
        
        .summary {
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            text-align: center;
        }
        
        .summary-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .summary-status {
            font-size: 48px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 图片管理菜单诊断工具</h1>
            <p>自动检测图片管理菜单显示问题并提供解决方案</p>
        </div>
        
        <div class="content">
            <div id="checks"></div>
            
            <button class="btn" onclick="runChecks()">🔄 重新检测</button>
            
            <div id="summary"></div>
        </div>
    </div>
    
    <script>
        function runChecks() {
            const checksContainer = document.getElementById('checks');
            const summaryContainer = document.getElementById('summary');
            checksContainer.innerHTML = '';
            summaryContainer.innerHTML = '';
            
            const checks = [];
            
            // 检查1：用户是否登录
            const username = sessionStorage.getItem('username');
            const isLoggedIn = !!username;
            checks.push({
                title: '检查用户登录状态',
                status: isLoggedIn ? 'success' : 'error',
                result: isLoggedIn 
                    ? `✓ 已登录，用户名：${username}`
                    : '✗ 未登录',
                solution: !isLoggedIn ? {
                    title: '解决方案',
                    steps: '请先登录系统。访问 <a href="/login">登录页面</a>'
                } : null
            });
            
            // 检查2：权限列表
            let permissions = [];
            try {
                permissions = JSON.parse(sessionStorage.getItem('permissions') || '[]');
            } catch (e) {
                permissions = [];
            }
            
            const hasPermissions = permissions.length > 0;
            checks.push({
                title: '检查权限列表',
                status: hasPermissions ? 'success' : 'error',
                result: hasPermissions 
                    ? `✓ 权限列表已加载，共 ${permissions.length} 项权限`
                    : '✗ 权限列表为空',
                detail: hasPermissions ? `<pre>${JSON.stringify(permissions, null, 2)}</pre>` : null,
                solution: !hasPermissions ? {
                    title: '解决方案',
                    steps: '1. 退出登录<br>2. 重新登录以获取权限列表'
                } : null
            });
            
            // 检查3：图片管理权限
            const hasImagePerm = permissions.includes('images:manage');
            checks.push({
                title: '检查图片管理权限',
                status: hasImagePerm ? 'success' : 'error',
                result: hasImagePerm 
                    ? '✓ 拥有 images:manage 权限'
                    : '✗ 缺少 images:manage 权限',
                solution: !hasImagePerm ? {
                    title: '解决方案',
                    steps: `
                        <strong>原因：</strong>权限信息在登录时获取，如果在添加图片管理功能之前已登录，需要重新登录。<br><br>
                        <strong>步骤：</strong><br>
                        1. 点击右上角"退出登录"<br>
                        2. 使用 admin 或 curator 账号重新登录<br>
                        3. 登录后权限列表会自动更新<br><br>
                        <strong>快速清除权限缓存：</strong><br>
                        在控制台执行：<code>sessionStorage.removeItem('permissions'); location.reload();</code>
                    `
                } : null
            });
            
            // 检查4：角色权限
            const roleCode = sessionStorage.getItem('roleCode');
            const allowedRoles = ['ADMIN', 'CURATOR'];
            const hasCorrectRole = allowedRoles.includes(roleCode);
            checks.push({
                title: '检查用户角色',
                status: hasCorrectRole ? 'success' : 'warning',
                result: roleCode 
                    ? `当前角色：${roleCode} ${hasCorrectRole ? '✓' : '✗'}`
                    : '未检测到角色信息',
                solution: !hasCorrectRole && roleCode ? {
                    title: '说明',
                    steps: `
                        图片管理功能仅对以下角色开放：<br>
                        • ADMIN（系统管理员）✓<br>
                        • CURATOR（文物管理员）✓<br><br>
                        您当前的角色 <strong>${roleCode}</strong> 无权访问图片管理功能。
                    `
                } : null
            });
            
            // 检查5：菜单项是否渲染
            const menuItem = parent.document.querySelector('[index="/images"]');
            const isMenuRendered = !!menuItem;
            checks.push({
                title: '检查菜单项渲染',
                status: isMenuRendered ? 'success' : 'error',
                result: isMenuRendered 
                    ? '✓ 菜单项已渲染'
                    : '✗ 菜单项未渲染',
                detail: isMenuRendered ? `菜单文本：${menuItem.textContent}` : null,
                solution: !isMenuRendered && hasImagePerm ? {
                    title: '解决方案',
                    steps: '权限正确但菜单未渲染，可能是前端代码问题。<br>1. 刷新页面（Ctrl+F5）<br>2. 清除浏览器缓存<br>3. 检查浏览器控制台是否有错误'
                } : null
            });
            
            // 检查6：路由配置
            const currentUrl = window.location.href;
            checks.push({
                title: '检查路由配置',
                status: 'success',
                result: '可以尝试直接访问图片管理页面',
                detail: `<a href="/images" target="_parent" style="color: #667eea; text-decoration: none; font-weight: 600;">点击这里访问图片管理页面</a>`
            });
            
            // 渲染检查结果
            checks.forEach(check => {
                const div = document.createElement('div');
                div.className = `check-item ${check.status}`;
                
                let html = `
                    <div class="check-title">
                        <span class="icon ${check.status}">${
                            check.status === 'success' ? '✓' : 
                            check.status === 'error' ? '✗' : '!'
                        }</span>
                        ${check.title}
                    </div>
                    <div class="check-result">
                        ${check.result}
                        ${check.detail || ''}
                    </div>
                `;
                
                if (check.solution) {
                    html += `
                        <div class="solution">
                            <div class="solution-title">${check.solution.title}</div>
                            <div class="solution-steps">${check.solution.steps}</div>
                        </div>
                    `;
                }
                
                div.innerHTML = html;
                checksContainer.appendChild(div);
            });
            
            // 生成总结
            const successCount = checks.filter(c => c.status === 'success').length;
            const errorCount = checks.filter(c => c.status === 'error').length;
            const warningCount = checks.filter(c => c.status === 'warning').length;
            
            let summaryStatus = '✓';
            let summaryText = '所有检查通过！';
            let summaryClass = 'success';
            
            if (errorCount > 0) {
                summaryStatus = '✗';
                summaryText = `发现 ${errorCount} 个问题需要解决`;
                summaryClass = 'error';
            } else if (warningCount > 0) {
                summaryStatus = '⚠';
                summaryText = `有 ${warningCount} 个警告`;
                summaryClass = 'warning';
            }
            
            summaryContainer.innerHTML = `
                <div class="summary">
                    <div class="summary-status">${summaryStatus}</div>
                    <div class="summary-title">${summaryText}</div>
                    <div style="color: #666; font-size: 14px;">
                        成功: ${successCount} | 错误: ${errorCount} | 警告: ${warningCount}
                    </div>
                </div>
            `;
        }
        
        // 页面加载时自动运行检查
        window.onload = runChecks;
    </script>
</body>
</html>
