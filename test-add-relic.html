<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试新增文物接口</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: inline-block;
            width: 120px;
            font-weight: bold;
        }
        input, select, textarea {
            width: 300px;
            padding: 5px;
        }
        button {
            padding: 10px 20px;
            background-color: #409eff;
            color: white;
            border: none;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background-color: #66b1ff;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            background-color: #f5f5f5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .success {
            background-color: #f0f9ff;
            border-color: #409eff;
        }
        .error {
            background-color: #fef0f0;
            border-color: #f56c6c;
        }
    </style>
</head>
<body>
    <h1>测试新增文物接口</h1>
    
    <div class="form-group">
        <label>文物名称*:</label>
        <input type="text" id="relicName" value="测试青铜鼎" required>
    </div>
    
    <div class="form-group">
        <label>年代*:</label>
        <input type="text" id="era" value="商代" required>
    </div>
    
    <div class="form-group">
        <label>材质*:</label>
        <input type="text" id="material" value="青铜" required>
    </div>
    
    <div class="form-group">
        <label>分类ID:</label>
        <input type="number" id="categoryId" value="2">
    </div>
    
    <div class="form-group">
        <label>状态:</label>
        <select id="status">
            <option value="在库">在库</option>
            <option value="借展中">借展中</option>
            <option value="修复中">修复中</option>
            <option value="封存">封存</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>尺寸:</label>
        <input type="text" id="dimensions" value="高30cm">
    </div>
    
    <div class="form-group">
        <label>重量(kg):</label>
        <input type="number" id="weight" value="15.5" step="0.01">
    </div>
    
    <div class="form-group">
        <label>产地:</label>
        <input type="text" id="origin" value="河南安阳">
    </div>
    
    <div class="form-group">
        <label>描述:</label>
        <textarea id="description" rows="3">测试用商代青铜鼎</textarea>
    </div>
    
    <div class="form-group">
        <label>图片文件:</label>
        <input type="file" id="imageFile" accept="image/*">
    </div>
    
    <div>
        <button onclick="testWithImage()">测试新增（带图片）</button>
        <button onclick="testWithoutImage()">测试新增（无图片）</button>
        <button onclick="testOriginalApi()">测试原有接口</button>
    </div>
    
    <div id="result"></div>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        
        function getToken() {
            return localStorage.getItem('token') || '';
        }
        
        function showResult(data, isSuccess = true) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = isSuccess ? 'success' : 'error';
            resultDiv.textContent = JSON.stringify(data, null, 2);
        }
        
        async function testWithImage() {
            const formData = new FormData();
            formData.append('relicName', document.getElementById('relicName').value);
            formData.append('era', document.getElementById('era').value);
            formData.append('material', document.getElementById('material').value);
            formData.append('status', document.getElementById('status').value);
            
            const categoryId = document.getElementById('categoryId').value;
            if (categoryId) formData.append('categoryId', categoryId);
            
            const dimensions = document.getElementById('dimensions').value;
            if (dimensions) formData.append('dimensions', dimensions);
            
            const weight = document.getElementById('weight').value;
            if (weight) formData.append('weight', weight);
            
            const origin = document.getElementById('origin').value;
            if (origin) formData.append('origin', origin);
            
            const description = document.getElementById('description').value;
            if (description) formData.append('description', description);
            
            const imageFile = document.getElementById('imageFile').files[0];
            if (imageFile) {
                formData.append('imageFile', imageFile);
            }
            
            try {
                console.log('发送请求到:', API_BASE + '/relics/with-image');
                const response = await fetch(API_BASE + '/relics/with-image', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + getToken()
                    },
                    body: formData
                });
                
                const data = await response.json();
                console.log('响应:', data);
                showResult(data, data.code === 200);
                
                if (data.code === 200) {
                    alert('新增成功！文物ID: ' + data.data);
                } else {
                    alert('新增失败: ' + data.message);
                }
            } catch (error) {
                console.error('请求失败:', error);
                showResult({ error: error.message }, false);
                alert('请求失败: ' + error.message);
            }
        }
        
        async function testWithoutImage() {
            const formData = new FormData();
            formData.append('relicName', document.getElementById('relicName').value);
            formData.append('era', document.getElementById('era').value);
            formData.append('material', document.getElementById('material').value);
            formData.append('status', document.getElementById('status').value);
            
            const categoryId = document.getElementById('categoryId').value;
            if (categoryId) formData.append('categoryId', categoryId);
            
            const dimensions = document.getElementById('dimensions').value;
            if (dimensions) formData.append('dimensions', dimensions);
            
            const weight = document.getElementById('weight').value;
            if (weight) formData.append('weight', weight);
            
            const origin = document.getElementById('origin').value;
            if (origin) formData.append('origin', origin);
            
            const description = document.getElementById('description').value;
            if (description) formData.append('description', description);
            
            try {
                console.log('发送请求到:', API_BASE + '/relics/with-image');
                const response = await fetch(API_BASE + '/relics/with-image', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + getToken()
                    },
                    body: formData
                });
                
                const data = await response.json();
                console.log('响应:', data);
                showResult(data, data.code === 200);
                
                if (data.code === 200) {
                    alert('新增成功！文物ID: ' + data.data);
                } else {
                    alert('新增失败: ' + data.message);
                }
            } catch (error) {
                console.error('请求失败:', error);
                showResult({ error: error.message }, false);
                alert('请求失败: ' + error.message);
            }
        }
        
        async function testOriginalApi() {
            const data = {
                relicName: document.getElementById('relicName').value,
                era: document.getElementById('era').value,
                material: document.getElementById('material').value,
                status: document.getElementById('status').value,
                categoryId: document.getElementById('categoryId').value || null,
                dimensions: document.getElementById('dimensions').value,
                weight: parseFloat(document.getElementById('weight').value) || null,
                origin: document.getElementById('origin').value,
                description: document.getElementById('description').value
            };
            
            try {
                console.log('发送请求到:', API_BASE + '/relics');
                console.log('请求数据:', data);
                const response = await fetch(API_BASE + '/relics', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + getToken()
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                console.log('响应:', result);
                showResult(result, result.code === 200);
                
                if (result.code === 200) {
                    alert('新增成功！');
                } else {
                    alert('新增失败: ' + result.message);
                }
            } catch (error) {
                console.error('请求失败:', error);
                showResult({ error: error.message }, false);
                alert('请求失败: ' + error.message);
            }
        }
    </script>
</body>
</html>
