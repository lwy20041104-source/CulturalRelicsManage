<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试图片访问</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }
        h1 { color: #333; }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .test-url {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            word-break: break-all;
            margin: 10px 0;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #0056b3; }
        .result {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        img {
            max-width: 100%;
            border: 1px solid #ddd;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 测试图片访问</h1>
        
        <div class="test-section">
            <h3>1. 测试后端 API 是否可访问</h3>
            <button onclick="testBackendAPI()">测试后端连接</button>
            <div id="apiResult"></div>
        </div>
        
        <div class="test-section">
            <h3>2. 获取图片列表</h3>
            <button onclick="getImageList()">获取图片列表</button>
            <div id="imageListResult"></div>
        </div>
        
        <div class="test-section">
            <h3>3. 测试图片访问路径</h3>
            <p>输入图片路径（从数据库中获取）：</p>
            <input type="text" id="imagePath" placeholder="/uploads/xxx.jpg" style="width: 100%; padding: 8px;" />
            <br><br>
            <button onclick="testImageAccess()">测试访问</button>
            <div id="imageAccessResult"></div>
        </div>
        
        <div class="test-section">
            <h3>4. 检查 uploads 目录</h3>
            <button onclick="checkUploadsDir()">检查目录</button>
            <div id="uploadsDirResult"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        
        async function testBackendAPI() {
            const resultDiv = document.getElementById('apiResult');
            resultDiv.innerHTML = '<p>⏳ 测试中...</p>';
            
            try {
                const response = await fetch(`${API_BASE}/auth/admin/self-check`);
                if (response.ok) {
                    resultDiv.innerHTML = '<div class="result success">✅ 后端 API 可访问</div>';
                } else {
                    resultDiv.innerHTML = `<div class="result error">❌ 后端返回错误: ${response.status}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error">❌ 无法连接后端: ${error.message}</div>`;
            }
        }
        
        async function getImageList() {
            const resultDiv = document.getElementById('imageListResult');
            resultDiv.innerHTML = '<p>⏳ 获取中...</p>';
            
            const token = sessionStorage.getItem('token');
            if (!token) {
                resultDiv.innerHTML = '<div class="result error">❌ 未登录，请先登录系统</div>';
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/images?pageNum=1&pageSize=5`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.data && data.data.records && data.data.records.length > 0) {
                    let html = '<div class="result success">✅ 获取成功</div>';
                    html += '<h4>图片列表：</h4>';
                    html += '<ul>';
                    data.data.records.forEach(img => {
                        html += `<li>`;
                        html += `<strong>${img.imageName}</strong><br>`;
                        html += `路径: <code>${img.filePath}</code><br>`;
                        html += `<button onclick="testSpecificImage('${img.filePath}')">测试这张图片</button>`;
                        html += `</li><br>`;
                    });
                    html += '</ul>';
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = '<div class="result error">❌ 没有图片数据</div>';
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error">❌ 获取失败: ${error.message}</div>`;
            }
        }
        
        function testSpecificImage(path) {
            document.getElementById('imagePath').value = path;
            testImageAccess();
        }
        
        async function testImageAccess() {
            const imagePath = document.getElementById('imagePath').value.trim();
            const resultDiv = document.getElementById('imageAccessResult');
            
            if (!imagePath) {
                resultDiv.innerHTML = '<div class="result error">❌ 请输入图片路径</div>';
                return;
            }
            
            resultDiv.innerHTML = '<p>⏳ 测试中...</p>';
            
            // 测试多个可能的 URL
            const urls = [
                `${API_BASE}${imagePath}`,                    // http://localhost:8080/api/uploads/xxx.jpg
                `http://localhost:8080${imagePath}`,          // http://localhost:8080/uploads/xxx.jpg
                `${API_BASE}/static${imagePath}`,             // http://localhost:8080/api/static/uploads/xxx.jpg
            ];
            
            let html = '<h4>测试结果：</h4>';
            
            for (const url of urls) {
                html += `<div class="test-url">测试 URL: ${url}</div>`;
                
                try {
                    const response = await fetch(url);
                    if (response.ok) {
                        html += `<div class="result success">✅ 可访问 (${response.status})</div>`;
                        html += `<img src="${url}" alt="测试图片" />`;
                        break;
                    } else {
                        html += `<div class="result error">❌ 不可访问 (${response.status})</div>`;
                    }
                } catch (error) {
                    html += `<div class="result error">❌ 请求失败: ${error.message}</div>`;
                }
            }
            
            resultDiv.innerHTML = html;
        }
        
        async function checkUploadsDir() {
            const resultDiv = document.getElementById('uploadsDirResult');
            resultDiv.innerHTML = '<p>⏳ 检查中...</p>';
            
            let html = '<h4>检查结果：</h4>';
            html += '<p>请在后端控制台查看以下信息：</p>';
            html += '<ul>';
            html += '<li>启动日志中的"配置静态资源访问路径"</li>';
            html += '<li>uploads 目录的实际路径</li>';
            html += '<li>是否有文件上传成功的日志</li>';
            html += '</ul>';
            html += '<p><strong>预期路径：</strong></p>';
            html += '<div class="test-url">项目根目录/uploads/</div>';
            html += '<p>或</p>';
            html += '<div class="test-url">E:\\java\\Graduate\\CulturalRelicsManage\\CulturalRelicsManage\\uploads\\</div>';
            
            resultDiv.innerHTML = html;
        }
    </script>
</body>
</html>
