<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试新增文物 - 错误处理验证</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .test-section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }
        .file-input-label {
            display: block;
            padding: 10px;
            background: #f0f0f0;
            border: 2px dashed #ddd;
            border-radius: 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .file-input-label:hover {
            background: #e8e8e8;
            border-color: #667eea;
        }
        .file-preview {
            margin-top: 10px;
            max-width: 200px;
            border-radius: 4px;
        }
        button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
        }
        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .log-section {
            margin-top: 30px;
            padding: 20px;
            background: #1e1e1e;
            border-radius: 8px;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 400px;
            overflow-y: auto;
        }
        .log-entry {
            margin-bottom: 8px;
            padding: 5px;
            border-left: 3px solid transparent;
        }
        .log-info {
            border-left-color: #3498db;
            color: #3498db;
        }
        .log-success {
            border-left-color: #2ecc71;
            color: #2ecc71;
        }
        .log-error {
            border-left-color: #e74c3c;
            color: #e74c3c;
        }
        .log-warning {
            border-left-color: #f39c12;
            color: #f39c12;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }
        .status-success {
            background: #d4edda;
            color: #155724;
        }
        .status-error {
            background: #f8d7da;
            color: #721c24;
        }
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        .required {
            color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 新增文物测试 - 错误处理验证</h1>
        <p class="subtitle">测试前端是否正确处理后端返回的错误响应</p>

        <!-- 测试1: 正常新增（有图片） -->
        <div class="test-section">
            <h2>测试 1: 正常新增文物（带图片）</h2>
            <form id="form1">
                <div class="form-group">
                    <label>文物名称 <span class="required">*</span></label>
                    <input type="text" name="relicName" value="测试青铜器" required>
                </div>
                <div class="form-group">
                    <label>年代 <span class="required">*</span></label>
                    <input type="text" name="era" value="商朝" required>
                </div>
                <div class="form-group">
                    <label>材质 <span class="required">*</span></label>
                    <input type="text" name="material" value="青铜" required>
                </div>
                <div class="form-group">
                    <label>分类ID <span class="required">*</span></label>
                    <input type="number" name="categoryId" value="1" required>
                </div>
                <div class="form-group">
                    <label>状态 <span class="required">*</span></label>
                    <select name="status" required>
                        <option value="在库" selected>在库</option>
                        <option value="借展中">借展中</option>
                        <option value="修复中">修复中</option>
                        <option value="封存">封存</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>图片</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="imageFile1" accept="image/*">
                        <label for="imageFile1" class="file-input-label">
                            📁 点击选择图片文件
                        </label>
                    </div>
                    <img id="preview1" class="file-preview" style="display:none;">
                </div>
                <button type="submit">提交测试 1</button>
                <span id="status1" class="status-badge status-pending">等待测试</span>
            </form>
        </div>

        <!-- 测试2: 正常新增（无图片） -->
        <div class="test-section">
            <h2>测试 2: 正常新增文物（不带图片）</h2>
            <form id="form2">
                <div class="form-group">
                    <label>文物名称 <span class="required">*</span></label>
                    <input type="text" name="relicName" value="测试陶器" required>
                </div>
                <div class="form-group">
                    <label>年代 <span class="required">*</span></label>
                    <input type="text" name="era" value="新石器时代" required>
                </div>
                <div class="form-group">
                    <label>材质 <span class="required">*</span></label>
                    <input type="text" name="material" value="陶" required>
                </div>
                <div class="form-group">
                    <label>分类ID <span class="required">*</span></label>
                    <input type="number" name="categoryId" value="2" required>
                </div>
                <div class="form-group">
                    <label>状态 <span class="required">*</span></label>
                    <select name="status" required>
                        <option value="在库" selected>在库</option>
                    </select>
                </div>
                <button type="submit">提交测试 2</button>
                <span id="status2" class="status-badge status-pending">等待测试</span>
            </form>
        </div>

        <!-- 测试3: 模拟错误（缺少必填字段） -->
        <div class="test-section">
            <h2>测试 3: 错误处理（缺少必填字段）</h2>
            <p style="color: #666; margin-bottom: 15px;">此测试会发送不完整的数据，验证前端是否正确显示错误</p>
            <button id="testError">触发错误测试</button>
            <span id="status3" class="status-badge status-pending">等待测试</span>
        </div>

        <!-- 日志区域 -->
        <div class="log-section">
            <div style="margin-bottom: 10px; font-weight: bold; color: #fff;">📋 测试日志</div>
            <div id="logContainer"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        const logContainer = document.getElementById('logContainer');

        function log(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function updateStatus(testId, success) {
            const statusEl = document.getElementById(`status${testId}`);
            if (success) {
                statusEl.className = 'status-badge status-success';
                statusEl.textContent = '✅ 测试通过';
            } else {
                statusEl.className = 'status-badge status-error';
                statusEl.textContent = '❌ 测试失败';
            }
        }

        // 图片预览
        document.getElementById('imageFile1').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('preview1');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
                log(`已选择图片: ${file.name} (${(file.size / 1024).toFixed(2)} KB)`, 'info');
            }
        });

        // 测试1: 带图片新增
        document.getElementById('form1').addEventListener('submit', async function(e) {
            e.preventDefault();
            log('========== 开始测试 1: 带图片新增 ==========', 'info');
            
            const formData = new FormData(this);
            const imageFile = document.getElementById('imageFile1').files[0];
            
            if (imageFile) {
                formData.append('imageFile', imageFile);
                log(`图片文件: ${imageFile.name}`, 'info');
            } else {
                log('警告: 未选择图片文件', 'warning');
            }

            try {
                log('发送请求到: POST /relics/with-image', 'info');
                const response = await fetch(`${API_BASE}/relics/with-image`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                log(`响应状态码: ${response.status}`, 'info');
                log(`响应数据: ${JSON.stringify(result)}`, 'info');

                // ✅ 关键检查: response.code === 200
                if (result.code === 200) {
                    log('✅ 成功: ' + result.message, 'success');
                    log(`文物ID: ${result.data}`, 'success');
                    updateStatus(1, true);
                } else {
                    log('❌ 失败: ' + result.message, 'error');
                    updateStatus(1, false);
                }
            } catch (error) {
                log('❌ 请求异常: ' + error.message, 'error');
                updateStatus(1, false);
            }
        });

        // 测试2: 不带图片新增
        document.getElementById('form2').addEventListener('submit', async function(e) {
            e.preventDefault();
            log('========== 开始测试 2: 不带图片新增 ==========', 'info');
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            
            log('请求数据: ' + JSON.stringify(data), 'info');

            try {
                log('发送请求到: POST /relics', 'info');
                const response = await fetch(`${API_BASE}/relics`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                log(`响应状态码: ${response.status}`, 'info');
                log(`响应数据: ${JSON.stringify(result)}`, 'info');

                // ✅ 关键检查: response.code === 200
                if (result.code === 200) {
                    log('✅ 成功: ' + result.message, 'success');
                    updateStatus(2, true);
                } else {
                    log('❌ 失败: ' + result.message, 'error');
                    updateStatus(2, false);
                }
            } catch (error) {
                log('❌ 请求异常: ' + error.message, 'error');
                updateStatus(2, false);
            }
        });

        // 测试3: 错误处理
        document.getElementById('testError').addEventListener('click', async function() {
            log('========== 开始测试 3: 错误处理 ==========', 'info');
            
            // 发送不完整的数据（缺少必填字段）
            const incompleteData = {
                relicName: '测试文物'
                // 缺少 era, material, categoryId, status
            };
            
            log('发送不完整数据: ' + JSON.stringify(incompleteData), 'warning');

            try {
                const response = await fetch(`${API_BASE}/relics`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(incompleteData)
                });

                const result = await response.json();
                log(`响应状态码: ${response.status}`, 'info');
                log(`响应数据: ${JSON.stringify(result)}`, 'info');

                // ✅ 关键检查: 应该返回错误
                if (result.code !== 200) {
                    log('✅ 正确处理错误: ' + result.message, 'success');
                    log('前端应该显示此错误消息给用户', 'success');
                    updateStatus(3, true);
                } else {
                    log('❌ 错误: 应该返回失败但返回了成功', 'error');
                    updateStatus(3, false);
                }
            } catch (error) {
                log('❌ 请求异常: ' + error.message, 'error');
                updateStatus(3, false);
            }
        });

        // 页面加载时的说明
        log('测试页面已加载', 'info');
        log('请确保后端服务运行在 http://localhost:8080', 'warning');
        log('请按顺序执行测试 1、2、3', 'info');
        log('观察每个测试的响应和状态', 'info');
    </script>
</body>
</html>
